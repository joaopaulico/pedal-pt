<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" fill="none">
  <!-- ============================================ -->
  <!--  CARTOON CYCLIST ON CANYON GRAVEL BIKE       -->
  <!--  Sage green frame, tan sidewall tires        -->
  <!-- ============================================ -->

  <!-- === BACK WHEEL === -->
  <!-- Tire -->
  <circle cx="170" cy="310" r="82" stroke="#c4a06a" stroke-width="16" fill="none"/>
  <!-- Rim -->
  <circle cx="170" cy="310" r="68" stroke="#333" stroke-width="3"/>
  <!-- Hub -->
  <circle cx="170" cy="310" r="10" fill="#555" stroke="#333" stroke-width="2"/>
  <!-- Spokes -->
  <line x1="170" y1="242" x2="170" y2="280" stroke="#999" stroke-width="1.2"/>
  <line x1="170" y1="340" x2="170" y2="378" stroke="#999" stroke-width="1.2"/>
  <line x1="102" y1="310" x2="140" y2="310" stroke="#999" stroke-width="1.2"/>
  <line x1="200" y1="310" x2="238" y2="310" stroke="#999" stroke-width="1.2"/>
  <line x1="128" y1="268" x2="152" y2="290" stroke="#999" stroke-width="1.2"/>
  <line x1="212" y1="352" x2="188" y2="330" stroke="#999" stroke-width="1.2"/>
  <line x1="212" y1="268" x2="188" y2="290" stroke="#999" stroke-width="1.2"/>
  <line x1="128" y1="352" x2="152" y2="330" stroke="#999" stroke-width="1.2"/>

  <!-- === FRONT WHEEL === -->
  <!-- Tire -->
  <circle cx="430" cy="310" r="82" stroke="#c4a06a" stroke-width="16" fill="none"/>
  <!-- Rim -->
  <circle cx="430" cy="310" r="68" stroke="#333" stroke-width="3"/>
  <!-- Hub -->
  <circle cx="430" cy="310" r="10" fill="#555" stroke="#333" stroke-width="2"/>
  <!-- Spokes -->
  <line x1="430" y1="242" x2="430" y2="280" stroke="#999" stroke-width="1.2"/>
  <line x1="430" y1="340" x2="430" y2="378" stroke="#999" stroke-width="1.2"/>
  <line x1="362" y1="310" x2="400" y2="310" stroke="#999" stroke-width="1.2"/>
  <line x1="460" y1="310" x2="498" y2="310" stroke="#999" stroke-width="1.2"/>
  <line x1="388" y1="268" x2="412" y2="290" stroke="#999" stroke-width="1.2"/>
  <line x1="472" y1="352" x2="448" y2="330" stroke="#999" stroke-width="1.2"/>
  <line x1="472" y1="268" x2="448" y2="290" stroke="#999" stroke-width="1.2"/>
  <line x1="388" y1="352" x2="412" y2="330" stroke="#999" stroke-width="1.2"/>

  <!-- === BIKE FRAME (Canyon gravel, sage green) === -->
  <!-- Seat tube -->
  <line x1="230" y1="180" x2="248" y2="310" stroke="#8fb5a1" stroke-width="10" stroke-linecap="round"/>
  <!-- Top tube -->
  <line x1="230" y1="180" x2="380" y2="178" stroke="#8fb5a1" stroke-width="9" stroke-linecap="round"/>
  <!-- Down tube -->
  <line x1="260" y1="195" x2="370" y2="305" stroke="#8fb5a1" stroke-width="10" stroke-linecap="round"/>
  <!-- Chainstay -->
  <line x1="248" y1="310" x2="170" y2="310" stroke="#8fb5a1" stroke-width="7" stroke-linecap="round"/>
  <!-- Seatstay -->
  <line x1="230" y1="188" x2="170" y2="310" stroke="#8fb5a1" stroke-width="5" stroke-linecap="round"/>
  <!-- Head tube -->
  <line x1="380" y1="178" x2="395" y2="220" stroke="#8fb5a1" stroke-width="10" stroke-linecap="round"/>
  <!-- Fork -->
  <path d="M395 220 Q410 270 430 310" stroke="#8fb5a1" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Bottom bracket -->
  <circle cx="248" cy="310" r="12" fill="#666" stroke="#444" stroke-width="2"/>
  <!-- Crank arm (front) -->
  <line x1="248" y1="310" x2="228" y2="345" stroke="#555" stroke-width="5" stroke-linecap="round"/>
  <!-- Pedal -->
  <rect x="217" y="340" width="22" height="8" rx="3" fill="#444"/>
  <!-- Crank arm (back) -->
  <line x1="248" y1="310" x2="268" y2="278" stroke="#555" stroke-width="5" stroke-linecap="round"/>
  <rect x="258" y="270" width="22" height="8" rx="3" fill="#444"/>

  <!-- Chainring -->
  <circle cx="248" cy="310" r="22" stroke="#555" stroke-width="2" fill="none"/>
  <!-- Chain line (simplified) -->
  <line x1="270" y1="310" x2="170" y2="310" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Rear cassette -->
  <circle cx="170" cy="310" r="16" stroke="#666" stroke-width="2" fill="none"/>

  <!-- Seat post -->
  <line x1="228" y1="180" x2="222" y2="148" stroke="#555" stroke-width="6" stroke-linecap="round"/>
  <!-- Saddle -->
  <ellipse cx="222" cy="142" rx="30" ry="8" fill="#333" rx="5"/>

  <!-- Handlebar stem -->
  <line x1="380" y1="178" x2="408" y2="168" stroke="#555" stroke-width="5" stroke-linecap="round"/>
  <!-- Drop bars -->
  <path d="M408 168 L420 168 Q435 168 435 180 L435 198 Q435 210 425 215" stroke="#333" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Bar tape wraps -->
  <path d="M408 168 L420 168 Q435 168 435 180 L435 198 Q435 210 425 215" stroke="#269b6c" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-dasharray="6 8" opacity="0.6"/>

  <!-- Disc brake rotor (front) -->
  <circle cx="430" cy="310" r="20" stroke="#ccc" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
  <!-- Disc brake rotor (rear) -->
  <circle cx="170" cy="310" r="20" stroke="#ccc" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>

  <!-- "CANYON" text on down tube -->
  <text x="295" y="258" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#5a8a72" transform="rotate(32 295 258)" letter-spacing="2">CANYON</text>

  <!-- === RIDER (cartoon style) === -->
  <!-- Body / torso - leaning forward cycling position -->
  <path d="M240 155 Q280 120 360 140" stroke="#2d3748" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <!-- Left leg (pushing down on pedal) -->
  <path d="M248 165 Q250 230 228 345" stroke="#2d3748" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Right leg (up) -->
  <path d="M252 165 Q290 250 268 278" stroke="#2d3748" stroke-width="13" fill="none" stroke-linecap="round"/>

  <!-- Left arm reaching handlebar -->
  <path d="M340 135 Q380 155 418 170" stroke="#2d3748" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M345 145 Q385 160 420 175" stroke="#2d3748" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Cycling shoes -->
  <ellipse cx="225" cy="350" rx="14" ry="6" fill="#269b6c"/>
  <ellipse cx="275" cy="275" rx="14" ry="6" fill="#269b6c"/>

  <!-- === HEAD === -->
  <!-- Helmet -->
  <ellipse cx="370" cy="110" rx="32" ry="22" fill="#269b6c" transform="rotate(-10 370 110)"/>
  <!-- Helmet vents -->
  <line x1="352" y1="100" x2="362" y2="98" stroke="#1a7d57" stroke-width="2" stroke-linecap="round"/>
  <line x1="365" y1="97" x2="375" y2="96" stroke="#1a7d57" stroke-width="2" stroke-linecap="round"/>
  <line x1="378" y1="98" x2="388" y2="100" stroke="#1a7d57" stroke-width="2" stroke-linecap="round"/>
  <!-- Helmet visor -->
  <path d="M345 118 Q355 122 370 120" stroke="#1a7d57" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Face -->
  <circle cx="368" cy="118" r="16" fill="#f0d5b8"/>
  <!-- Sunglasses -->
  <path d="M355 115 Q362 110 378 113 Q385 114 390 117" stroke="#222" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Glasses lens shapes -->
  <ellipse cx="363" cy="115" rx="7" ry="4" fill="#222" opacity="0.85"/>
  <ellipse cx="380" cy="116" rx="7" ry="4" fill="#222" opacity="0.85"/>
  <!-- Nose -->
  <path d="M372 119 L373 123" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M366 126 Q372 131 378 126" stroke="#c4956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Jersey details -->
  <!-- Green jersey with darker stripe -->
  <path d="M260 145 Q300 120 350 135" stroke="#269b6c" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Cycling gloves on hands -->
  <circle cx="418" cy="170" r="6" fill="#333"/>
  <circle cx="420" cy="176" r="6" fill="#333"/>

  <!-- === MOTION LINES === -->
  <line x1="60" y1="200" x2="95" y2="200" stroke="#269b6c" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="50" y1="230" x2="80" y2="230" stroke="#269b6c" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="65" y1="260" x2="85" y2="260" stroke="#269b6c" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <line x1="55" y1="170" x2="78" y2="170" stroke="#269b6c" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- Ground shadow -->
  <ellipse cx="300" cy="400" rx="200" ry="10" fill="#000" opacity="0.04"/>
</svg>
